<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Ria{% endblock %}</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            display: flex;
        }
        nav {
            width: 200px;
            min-height: 100vh;
            background-color: #2c3e50;
            padding: 1rem;
            box-sizing: border-box;
        }
        nav a {
            display: block;
            color: #ecf0f1;
            text-decoration: none;
            padding: 0.5rem 0;
        }
        nav a:hover {
            color: #3498db;
        }
        main {
            flex: 1;
            padding: 1rem 2rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/aboutme">About Me</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
